version: "3.9"

# ================================================================
# StatIQ — Data Ingestion & Database Stack
# Member 1 owns this entire file.
#
# Services:
#   postgres   → primary database (PostgreSQL 16 + TimescaleDB)
#   redis      → NL-SQL cache + rate limiting
#   minio      → Parquet object storage (S3-compatible)
#   airflow    → pipeline orchestrator (DAG scheduler + web UI)
#
# Start all:   docker-compose up -d
# Stop all:    docker-compose down
# View logs:   docker-compose logs -f postgres
# ================================================================

services:

  # ── 1. PostgreSQL 16 + TimescaleDB ──────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: statiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     statiq
      POSTGRES_PASSWORD: statiq123
      POSTGRES_DB:       statiq
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statiq -d statiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 1b. pgAdmin 4 (Database Viewer) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: statiq-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@statiq.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy


  # ── 2. Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: statiq-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── 3. MinIO ────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: statiq-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     statiq
      MINIO_ROOT_PASSWORD: statiq123
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Auto-create MinIO buckets on first start
  minio-setup:
    image: minio/mc:latest
    container_name: statiq-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 statiq statiq123;
        mc mb --ignore-existing local/statiq-raw;
        mc mb --ignore-existing local/statiq-parquet;
        mc mb --ignore-existing local/statiq-processed;
        echo 'Buckets ready: statiq-raw, statiq-parquet, statiq-processed';
      "

# ── 4. Apache Airflow ───────────────────────────────────────

  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: statiq-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://statiq:statiq123@postgres:5432/statiq
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: version
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ../src:/opt/airflow/statiq_src

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: statiq-airflow-web
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://statiq:statiq123@postgres:5432/statiq
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: "/opt/airflow/statiq_src"
    ports:
      - "8080:8080"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../src:/opt/airflow/statiq_src
      - airflow_logs:/opt/airflow/logs
    command: webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: statiq-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://statiq:statiq123@postgres:5432/statiq
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: "/opt/airflow/statiq_src"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../src:/opt/airflow/statiq_src
      - airflow_logs:/opt/airflow/logs
    command: scheduler

volumes:
  postgres_data:
  redis_data:
  minio_data:
  airflow_logs:
