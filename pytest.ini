# pytest.ini — mospi-platform
[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=api
    --cov=security
    --cov-report=term-missing
    --cov-fail-under=75
markers =
    asyncio: async tests
    slow: tests that take more than 2 seconds
    security: OWASP penetration tests
